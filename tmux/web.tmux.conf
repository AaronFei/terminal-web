# tmux configuration for terminal-web
# Loaded via: tmux -f <repo>/tmux/web.tmux.conf ...
# Goal: a clean, full-screen, mouse-scrollable session with a large history
# that survives browser disconnects.

# --- Mouse & scrolling -------------------------------------------------------
# Enable mouse support: clicking, selecting, and (most importantly) wheel
# scrolling, which drops you into copy-mode for browsing scrollback.
set -g mouse on

# Keep a deep scrollback buffer. xterm.js has its own scrollback too, but
# tmux owns the real history (e.g. after a reattach). Bump this if you need
# even more lines (costs memory per pane).
set -g history-limit 100000

# Smooth mouse-wheel scrolling: entering copy-mode on wheel-up and scrolling
# one line at a time feels natural in the browser. WheelDownPane in copy-mode
# scrolls down; reaching the bottom exits copy-mode back to the live shell.
bind -n WheelUpPane   if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if-shell -F -t = '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
bind -n WheelDownPane select-pane -t = \; send-keys -M

# --- Latency -----------------------------------------------------------------
# Remove the delay after pressing Escape so vim/editors feel responsive over
# the websocket.
set -sg escape-time 0

# --- Colors (truecolor / 24-bit) --------------------------------------------
# tmux-256color is the modern terminfo entry; the override advertises
# truecolor (Tc) so 24-bit color apps render correctly inside tmux.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# --- Appearance --------------------------------------------------------------
# Hide the status bar for a clean, edge-to-edge terminal in the browser.
# To re-enable it (e.g. to see session/window names), comment this out or run
# at runtime:  tmux set -g status on
set -g status off

# --- Session persistence (survive reboots) -----------------------------------
# tmux-resurrect saves/restores sessions, windows, panes, layouts and each
# pane's working directory; tmux-continuum auto-saves every 15 min and
# auto-restores the last snapshot when the tmux server starts — i.e. after a
# reboot, the cause of our lost sessions. The two plugins are plain git repos
# cloned per-machine into ~/.tmux/plugins (git-ignored, not in this repo); save
# files are per-machine too, so each box restores only its own sessions. We load
# them directly (no TPM) because this server runs off a custom config file that
# TPM's installer doesn't scan. Web-tab tags (@twtab / @twlabel) are re-applied
# by the server/client on reconnect, so resurrect only restores the contents.
#
# Install on a new machine:
#   git clone https://github.com/tmux-plugins/tmux-resurrect ~/.tmux/plugins/tmux-resurrect
#   git clone https://github.com/tmux-plugins/tmux-continuum ~/.tmux/plugins/tmux-continuum

# Restore each pane's scrollback contents, not just its layout, and re-launch
# Claude Code (`claude`) in panes that were running it — so after a reboot you
# land back in Claude in the right directory (a FRESH conversation, not the
# previous one; resurrect re-runs the command, it can't restore in-memory state).
# Add more processes to the list to auto-restore them too, e.g.
#   set -g @resurrect-processes 'claude "~npm run dev"'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'claude'
# Auto-restore the last saved environment when the server starts after a reboot.
set -g @continuum-restore 'on'

# Load the plugins. Guarded so a machine without them installed (a fresh clone)
# loads this config cleanly instead of erroring; persistence just activates once
# the repos are present. KEEP THESE LAST so the options above are set first.
if-shell "test -d ~/.tmux/plugins/tmux-resurrect" "run-shell '~/.tmux/plugins/tmux-resurrect/resurrect.tmux'"
if-shell "test -d ~/.tmux/plugins/tmux-continuum" "run-shell '~/.tmux/plugins/tmux-continuum/continuum.tmux'"
