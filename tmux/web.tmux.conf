# tmux configuration for terminal-web
# Loaded via: tmux -f <repo>/tmux/web.tmux.conf ...
# Goal: a clean, full-screen, mouse-scrollable session with a large history
# that survives browser disconnects.

# --- Mouse & scrolling -------------------------------------------------------
# Enable mouse support: clicking, selecting, and (most importantly) wheel
# scrolling, which drops you into copy-mode for browsing scrollback.
set -g mouse on

# Keep a deep scrollback buffer. xterm.js has its own scrollback too, but
# tmux owns the real history (e.g. after a reattach). Bump this if you need
# even more lines (costs memory per pane).
set -g history-limit 100000

# Smooth mouse-wheel scrolling: entering copy-mode on wheel-up and scrolling
# one line at a time feels natural in the browser. WheelDownPane in copy-mode
# scrolls down; reaching the bottom exits copy-mode back to the live shell.
bind -n WheelUpPane   if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if-shell -F -t = '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
bind -n WheelDownPane select-pane -t = \; send-keys -M

# --- Latency -----------------------------------------------------------------
# Remove the delay after pressing Escape so vim/editors feel responsive over
# the websocket.
set -sg escape-time 0

# --- Colors (truecolor / 24-bit) --------------------------------------------
# tmux-256color is the modern terminfo entry; the override advertises
# truecolor (Tc) so 24-bit color apps render correctly inside tmux.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# --- Appearance --------------------------------------------------------------
# Hide the status bar for a clean, edge-to-edge terminal in the browser.
# To re-enable it (e.g. to see session/window names), comment this out or run
# at runtime:  tmux set -g status on
set -g status off
